services:
  api:
    build:
      context: ./backend
    container_name: sentinel-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./workspace:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - sentinel-net
    restart: unless-stopped

  web:
    image: node:20-alpine
    container_name: sentinel-web
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - sentinel-net
    depends_on:
      - api
    restart: unless-stopped

networks:
  sentinel-net:
    driver: bridge
